name: Vercel Deploy

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to deploy when manually triggered
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
          - both
  push:
    branches:
      - main

concurrency:
  group: main-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24'
  PNPM_VERSION: '11.13.0'
  VERCEL_CLI_VERSION: '48.12.1'

jobs:
  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage threshold
        run: pnpm run test:coverage

      - name: Build app
        run: pnpm run build

      - name: Typecheck test project
        run: pnpm tsc -p tsconfig.spec.json --noEmit

      - name: Validate legacy phrases are removed
        run: pnpm run check:legacy-phrases

  deploy_preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: quality_gate
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && (inputs.target_environment == 'preview' || inputs.target_environment == 'both')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Vercel CLI
        run: npx --yes vercel@${{ env.VERCEL_CLI_VERSION }} --version

      - name: Validate Vercel secrets
        run: |
          [ -n "${{ secrets.VERCEL_TOKEN }}" ] || (echo "Missing VERCEL_TOKEN" && exit 1)
          [ -n "${{ secrets.VERCEL_ORG_ID }}" ] || (echo "Missing VERCEL_ORG_ID" && exit 1)
          [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ] || (echo "Missing VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel env (Preview)
        run: npx --yes vercel@${{ env.VERCEL_CLI_VERSION }} pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel artifacts (Preview)
        run: npx --yes vercel@${{ env.VERCEL_CLI_VERSION }} build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Preview
        id: preview
        run: |
          url=$(npx --yes vercel@${{ env.VERCEL_CLI_VERSION }} deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Publish preview URL to job summary
        run: |
          echo "### Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.preview.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality_gate
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && (inputs.target_environment == 'production' || inputs.target_environment == 'both')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Vercel CLI
        run: npx --yes vercel@${{ env.VERCEL_CLI_VERSION }} --version

      - name: Validate Vercel secrets
        run: |
          [ -n "${{ secrets.VERCEL_TOKEN }}" ] || (echo "Missing VERCEL_TOKEN" && exit 1)
          [ -n "${{ secrets.VERCEL_ORG_ID }}" ] || (echo "Missing VERCEL_ORG_ID" && exit 1)
          [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ] || (echo "Missing VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel env (Production)
        run: npx --yes vercel@${{ env.VERCEL_CLI_VERSION }} pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel artifacts (Production)
        run: npx --yes vercel@${{ env.VERCEL_CLI_VERSION }} build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Production
        id: production
        run: |
          url=$(npx --yes vercel@${{ env.VERCEL_CLI_VERSION }} deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Publish production URL to job summary
        run: |
          echo "### Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.production.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
